version: '3'

services:
  backend:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      - DJANGO_SUPERUSER_PASSWORD=SuperSecret123
      - DJANGO_SUPERUSER_USERNAME=admin
    entrypoint : |
      bash -c '
      python3 manage.py migrate && \
      python3 manage.py createsuperuser --email=admin@admin.com --noinput && \
      python3 manage.py runserver 0.0.0.0:8000'